version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hiddenroute_postgres
    environment:
      POSTGRES_USER: hiddenroute_user
      POSTGRES_PASSWORD: hiddenroute_password
      POSTGRES_DB: hiddenroute_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: hiddenroute_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:
